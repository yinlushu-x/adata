<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>昨日成交量前十股票实时行情</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .header .subtitle {
            color: #8892b0;
            font-size: 14px;
        }
        
        .update-time {
            text-align: center;
            margin-bottom: 20px;
            font-size: 13px;
            color: #64ffda;
        }
        
        .stock-table {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .table-header {
            display: grid;
            grid-template-columns: 80px 120px 1fr 100px 100px 100px 120px;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.08);
            font-weight: 600;
            font-size: 13px;
            color: #8892b0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .stock-row {
            display: grid;
            grid-template-columns: 80px 120px 1fr 100px 100px 100px 120px;
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            align-items: center;
        }
        
        .stock-row:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        
        .stock-row:last-child {
            border-bottom: none;
        }
        
        .rank {
            font-weight: 700;
            font-size: 16px;
            color: #64ffda;
        }
        
        .rank.top3 {
            background: linear-gradient(90deg, #ffd700, #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .stock-code {
            font-family: 'SF Mono', 'Monaco', 'Inconsolata', monospace;
            font-size: 14px;
            color: #ccd6f6;
        }
        
        .stock-name {
            font-weight: 500;
            font-size: 15px;
            color: #fff;
        }
        
        .price {
            font-weight: 600;
            font-size: 15px;
        }
        
        .change-pct {
            font-weight: 600;
            font-size: 14px;
            padding: 4px 10px;
            border-radius: 6px;
            text-align: center;
        }
        
        .up {
            color: #ff4757;
        }
        
        .up-bg {
            background: rgba(255, 71, 87, 0.15);
            color: #ff6b7a;
        }
        
        .down {
            color: #2ed573;
        }
        
        .down-bg {
            background: rgba(46, 213, 115, 0.15);
            color: #5dff9e;
        }
        
        .volume, .amount {
            font-size: 13px;
            color: #8892b0;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: #8892b0;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #64ffda;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error-message {
            text-align: center;
            padding: 40px;
            color: #ff6b7a;
        }
        
        .auto-refresh {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #8892b0;
        }
        
        .pulse {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #64ffda;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        
        @media (max-width: 768px) {
            .table-header, .stock-row {
                grid-template-columns: 60px 100px 1fr 80px;
            }
            
            .table-header > *:nth-child(5),
            .table-header > *:nth-child(7),
            .stock-row > *:nth-child(5),
            .stock-row > *:nth-child(7) {
                display: none;
            }
            
            .header h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>昨日成交量前十股票实时行情</h1>
            <div class="subtitle">自动刷新 · 实时数据</div>
        </div>
        
        <div class="update-time" id="updateTime">
            <span class="pulse"></span>
            <span>数据更新中...</span>
        </div>
        
        <div class="stock-table">
            <div class="table-header">
                <div>排名</div>
                <div>代码</div>
                <div>名称</div>
                <div>现价</div>
                <div>涨跌额</div>
                <div>涨跌幅</div>
                <div>成交量</div>
            </div>
            <div id="stockList">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <div>正在加载行情数据...</div>
                </div>
            </div>
        </div>
        
        <div class="auto-refresh">
            每10秒自动刷新数据
        </div>
    </div>

    <script>
        let useDemo = false;
        
        async function fetchStockData() {
            const url = useDemo ? '/api/demo' : '/api/realtime';
            
            try {
                const response = await fetch(url);
                const result = await response.json();
                
                if (result.success && result.data && result.data.length > 0) {
                    renderStockList(result.data);
                    updateTime(result.update_time);
                } else {
                    showError('暂无数据');
                    if (!useDemo) {
                        useDemo = true;
                        setTimeout(fetchStockData, 1000);
                    }
                }
            } catch (error) {
                console.error('获取数据失败:', error);
                showError('数据加载失败，请稍后重试');
                if (!useDemo) {
                    useDemo = true;
                    setTimeout(fetchStockData, 1000);
                }
            }
        }
        
        function renderStockList(data) {
            const container = document.getElementById('stockList');
            
            if (!data || data.length === 0) {
                container.innerHTML = '<div class="error-message">暂无数据</div>';
                return;
            }
            
            let html = '';
            data.forEach((stock, index) => {
                const rankClass = index < 3 ? 'top3' : '';
                const priceClass = stock.is_up ? 'up' : (stock.is_down ? 'down' : '');
                const changeClass = stock.is_up ? 'up-bg' : (stock.is_down ? 'down-bg' : '');
                const changePrefix = stock.change > 0 ? '+' : '';
                const changePctPrefix = stock.change_pct > 0 ? '+' : '';
                
                html += `
                    <div class="stock-row">
                        <div class="rank ${rankClass}">${index + 1}</div>
                        <div class="stock-code">${stock.stock_code}</div>
                        <div class="stock-name">${stock.short_name}</div>
                        <div class="price ${priceClass}">${stock.price.toFixed(2)}</div>
                        <div class="${priceClass}">${changePrefix}${stock.change.toFixed(2)}</div>
                        <div class="change-pct ${changeClass}">${changePctPrefix}${stock.change_pct.toFixed(2)}%</div>
                        <div class="volume">${stock.volume}</div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        function updateTime(time) {
            const container = document.getElementById('updateTime');
            container.innerHTML = `<span class="pulse"></span><span>最后更新: ${time}</span>`;
        }
        
        function showError(message) {
            const container = document.getElementById('stockList');
            container.innerHTML = `<div class="error-message">${message}</div>`;
        }
        
        fetchStockData();
        
        setInterval(fetchStockData, 10000);
    </script>
</body>
</html>
